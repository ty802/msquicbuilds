name: build msquic

on:
  workflow_dispatch:
    inputs:
      msquic_version:
        description: 'MsQuic base version (e.g. 2.6.0)'
        required: false
        default: '2.6.0'
      msquic_ref:
        description: 'MsQuic git ref (branch/tag/commit)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  #############################################################################
  # NATIVE BUILDS: runs directly on the target OS runner
  #############################################################################
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-amd64
            os: windows-2022
            platform: windows
            arch: x64
            tls: schannel

          - name: windows-arm64
            os: windows-2022
            platform: windows
            arch: arm64
            tls: schannel

          - name: windows-amd64-quictls
            os: windows-2022
            platform: windows
            arch: x64
            tls: quictls

          - name: linux-amd64
            os: ubuntu-22.04
            platform: linux
            arch: x64
            tls: quictls

          - name: macos-amd64
            os: macos-15
            platform: macos
            arch: x64
            tls: quictls

          - name: macos-arm64
            os: macos-15
            platform: macos
            arch: arm64
            tls: quictls

          - name: android-arm64
            os: ubuntu-22.04
            platform: android
            arch: arm64
            tls: quictls

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout msquic
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: microsoft/msquic
          submodules: false
          fetch-depth: 0
          path: src

      - name: Init required submodules
        shell: pwsh
        run: |
          $submodules = @()
          if ("${{ matrix.platform }}" -eq "windows") { $submodules += "submodules/xdp-for-windows" }
          if ("${{ matrix.tls }}" -ne "schannel")   { $submodules += "submodules/quictls" }
          if ($submodules.Count -gt 0) {
            git -C src submodule update --init --depth 1 $submodules
          }

      - name: Install deps (Linux native)
        if: runner.os == 'Linux' && matrix.platform == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake build-essential liblttng-ust-dev lttng-tools libssl-dev libnuma-dev

      - name: Setup Android NDK
        if: matrix.platform == 'android'
        run: |
          curl -sSL https://dl.google.com/android/repository/android-ndk-r27c-linux.zip -o /tmp/ndk.zip
          unzip -q /tmp/ndk.zip -d /opt
          echo "ANDROID_NDK_LATEST_HOME=/opt/android-ndk-r27c" >> "$GITHUB_ENV"

      - name: Install deps (Android)
        if: matrix.platform == 'android'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq cmake build-essential

      - name: Install NASM (Windows quictls)
        if: runner.os == 'Windows' && matrix.tls != 'schannel'
        uses: ilammy/setup-nasm@72793074d3c8cdda771dba85f6deafe00623038b # v1.5.2

      - name: Install Perl (Windows quictls — needed by OpenSSL build)
        if: runner.os == 'Windows' && matrix.tls != 'schannel'
        shell: pwsh
        run: choco install strawberryperl -y --no-progress --limit-output

      - name: Build
        shell: pwsh
        working-directory: src
        run: |
          if ($env:RUNNER_OS -eq 'Windows') {
            scripts/build.ps1 -Config Release -Platform ${{ matrix.platform }} -Arch ${{ matrix.arch }} -Tls ${{ matrix.tls }} -DisableTools -DisableTest -DisablePerf -Generator "Visual Studio 17 2022"
          } else {
            scripts/build.ps1 -Config Release -Platform ${{ matrix.platform }} -Arch ${{ matrix.arch }} -Tls ${{ matrix.tls }} -DisableTools -DisableTest -DisablePerf
          }

      - name: Upload raw artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.name }}
          path: src/artifacts/

  #############################################################################
  # LINUX ARM64 CROSS-COMPILE (needs the msquic cross-compile Docker image)
  #############################################################################
  linux-arm64:
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/microsoft/msquic/linux-build-xcomp:ubuntu-22.04-cross
    steps:
      - name: Checkout msquic
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: microsoft/msquic
          submodules: false
          fetch-depth: 0
          path: src

      - name: Init required submodules (quictls)
        shell: bash
        run: git -C src submodule update --init --depth 1 submodules/quictls

      - name: Fix git ownership
        run: chown -R $(id -u):$(id -g) src/
        shell: bash

      - name: Build (cross-compile)
        shell: pwsh
        working-directory: src
        run: scripts/build.ps1 -Config Release -Platform linux -Arch arm64 -Tls quictls -DisableTools -DisableTest -DisablePerf -OneBranch

      - name: Upload raw artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-arm64
          path: src/artifacts/

  #############################################################################
  # NUGET PACKAGING – produce all .nupkg in one job, push once
  #############################################################################
  nuget:
    needs: [build, linux-arm64]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: microsoft/msquic
          path: src

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-amd64
          path: src/artifacts

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-arm64
          path: src/artifacts

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-amd64-quictls
          path: src/artifacts

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: linux-amd64
          path: src/artifacts

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: linux-arm64
          path: src/artifacts

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: macos-amd64
          path: src/artifacts

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: macos-arm64
          path: src/artifacts

      - uses: nuget/setup-nuget@fd55a6f3b34392fa83fde1454582407d8c714123 # v4.0
        with:
          nuget-version: latest

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 8.x

      - name: Package all NuGet packages
        shell: pwsh
        working-directory: src
        run: |
          $ErrorActionPreference = 'Stop'
          $Root = Resolve-Path "."
          $ArtifactsDir = "$Root/artifacts"
          $DistDir = "$Root/../dist"
          $CommitHash = & git -C $Root rev-parse HEAD
          $RepoRemote = "https://github.com/microsoft/msquic.git"
          $Version = "${{ github.event.inputs.msquic_version }}-ci.$env:GITHUB_RUN_NUMBER"

          New-Item $DistDir -ItemType Directory -Force | Out-Null

          # ── Windows Schannel (x64 + arm64) ──────────────────────────────
          Write-Host "=== Packaging Windows (Schannel) ==="
          $WinPlatformDir = "$ArtifactsDir/bin/windows"
          function New-WinPkg { param($Tls, $Archs)
            $p = "$ArtifactsDir/temp/nuget/$Tls"
            Remove-Item $p -Recurse -Force -ErrorAction Ignore
            foreach ($a in $Archs) { New-Item "$p/build/native/lib/$a","$p/build/native/bin/$a" -Type Dir -Force | Out-Null }
            New-Item "$p/build/native/include" -Type Dir -Force | Out-Null
            foreach ($a in $Archs) {
              $b = "$WinPlatformDir/${a}_Release_${Tls}"
              Copy-Item "$b/msquic.dll","$b/msquic.pdb" "$p/build/native/bin/$a/"
              Copy-Item "$b/msquic.lib" "$p/build/native/lib/$a/"
            }
            foreach ($h in @("msquic.h","msquicp.h","msquic.hpp","msquic_winuser.h")) {
              Copy-Item "$Root/src/inc/$h" "$p/build/native/include/"
            }
            Copy-Item "$Root/LICENSE","$Root/src/distribution/pkgicon.png" $p
            $L = "$($Tls.Substring(0,1).ToUpper())$($Tls.Substring(1))"
@"
          <?xml version="1.0"?>
          <package xmlns="http://schemas.microsoft.com/packaging/2011/08/nuspec.xsd">
            <metadata>
              <id>MsQuicBuilds.Native.$L</id>
              <version>$Version</version>
              <title>MsQuic ($L)</title>
              <authors>Microsoft</authors>
              <license type="expression">MIT</license>
              <icon>pkgicon.png</icon>
              <projectUrl>https://github.com/microsoft/msquic</projectUrl>
              <requireLicenseAcceptance>true</requireLicenseAcceptance>
              <copyright>© Microsoft Corporation. All rights reserved.</copyright>
              <description>MsQuic native library for $($Archs -join ', ') using $Tls for TLS</description>
              <repository type="git" url="$RepoRemote" commit="$CommitHash" />
              <tags>native quic msquic $Tls</tags>
            </metadata>
          </package>
"@ | Set-Content "$p/MsQuicBuilds.Native.$L.nuspec" -Encoding UTF8

            $tl = @(
              '<?xml version="1.0" encoding="utf-8"?>',
              '<Project ToolsVersion="4.0" xmlns="http://schemas.microsoft.com/developer/msbuild/2003">',
              '  <ItemDefinitionGroup>',
              '    <ClCompile>',
              '      <AdditionalIncludeDirectories>`$(MSBuildThisFileDirectory)include/;%(AdditionalIncludeDirectories)</AdditionalIncludeDirectories>',
              '    </ClCompile>'
            )
            foreach ($a in $Archs) {
              $tl += "    <Link Condition=""'`$(Platform.ToLower())' == '$a'"">"
              $tl += "      <AdditionalDependencies>`$(MSBuildThisFileDirectory)lib/$a/msquic.lib;%(AdditionalDependencies)</AdditionalDependencies>"
              $tl += "    </Link>"
            }
            $tl += '  </ItemDefinitionGroup>'
            $tl += '  <Target Name="msquic_AfterBuild" AfterTargets="AfterBuild" />'
            foreach ($a in $Archs) {
              $tl += "  <Target Name=""msquic_AfterBuild_$a"" Label=""$a"" Condition=""'`$(Platform.ToLower())' == '$a'"" AfterTargets=""msquic_AfterBuild"">"
              $tl += "    <Copy SourceFiles=""`$(MSBuildThisFileDirectory)bin/$a/msquic.dll"" DestinationFolder=""`$(TargetDir)"" SkipUnchangedFiles=""true"" />"
              $tl += "  </Target>"
            }
            $tl += '</Project>'
            $tl -join "`n" | Set-Content "$p/build/native/MsQuicBuilds.Native.$L.targets" -Encoding UTF8

            nuget pack "$p/MsQuicBuilds.Native.$L.nuspec" -OutputDirectory $DistDir -p CommitHash=$CommitHash -p RepoRemote=$RepoRemote -Version $Version
          }

          New-WinPkg -Tls schannel -Archs @("x64","arm64")
          New-WinPkg -Tls quictls -Archs @("x64")

          # ── Linux (runtimes/ layout, x64 + arm64) ───────────────────────
          Write-Host "=== Packaging Linux ==="
          $nixPkg = "$ArtifactsDir/temp/linux"
          Remove-Item $nixPkg -Recurse -Force -ErrorAction Ignore
          foreach ($a in @("x64","arm64")) {
            New-Item "$nixPkg/runtimes/linux-$a/native" -Type Dir -Force | Out-Null
            Copy-Item "$ArtifactsDir/bin/linux/${a}_Release_quictls/libmsquic.so" "$nixPkg/runtimes/linux-$a/native/"
          }
          New-Item "$nixPkg/build/native/include" -Type Dir -Force | Out-Null
          foreach ($h in @("msquic.h","msquicp.h","msquic.hpp")) {
            Copy-Item "$Root/src/inc/$h" "$nixPkg/build/native/include/"
          }
          Copy-Item "$Root/LICENSE","$Root/src/distribution/pkgicon.png" $nixPkg
@"
          <?xml version="1.0"?>
          <package xmlns="http://schemas.microsoft.com/packaging/2013/05/nuspec.xsd">
            <metadata>
              <id>MsQuicBuilds.Native.Linux</id>
              <version>$Version</version>
              <title>MsQuic (Linux)</title>
              <authors>Microsoft</authors>
              <license type="expression">MIT</license>
              <icon>pkgicon.png</icon>
              <projectUrl>https://github.com/microsoft/msquic</projectUrl>
              <requireLicenseAcceptance>true</requireLicenseAcceptance>
              <copyright>© Microsoft Corporation. All rights reserved.</copyright>
              <description>MsQuic native library for linux-x64 and linux-arm64 using quictls for TLS</description>
              <repository type="git" url="$RepoRemote" commit="$CommitHash" />
              <tags>native quic msquic linux</tags>
            </metadata>
            <files>
              <file src="runtimes/**/*" target="runtimes/" />
              <file src="build/**/*" target="build/" />
              <file src="LICENSE" />
              <file src="pkgicon.png" />
            </files>
          </package>
"@ | Set-Content "$nixPkg/MsQuicBuilds.Native.Linux.nuspec" -Encoding UTF8
          nuget pack "$nixPkg/MsQuicBuilds.Native.Linux.nuspec" -OutputDirectory $DistDir -BasePath $nixPkg -p CommitHash=$CommitHash -p RepoRemote=$RepoRemote -Version $Version

          # ── macOS (runtimes/ layout, osx-x64 + osx-arm64) ───────────────
          Write-Host "=== Packaging macOS ==="
          $macPkg = "$ArtifactsDir/temp/macos"
          Remove-Item $macPkg -Recurse -Force -ErrorAction Ignore
          foreach ($e in @(@{a="x64";r="osx-x64"}, @{a="arm64";r="osx-arm64"})) {
            New-Item "$macPkg/runtimes/$($e.r)/native" -Type Dir -Force | Out-Null
            Copy-Item "$ArtifactsDir/bin/macos/$($e.a)_Release_quictls/libmsquic.dylib" "$macPkg/runtimes/$($e.r)/native/"
          }
          New-Item "$macPkg/build/native/include" -Type Dir -Force | Out-Null
          foreach ($h in @("msquic.h","msquicp.h","msquic.hpp")) {
            Copy-Item "$Root/src/inc/$h" "$macPkg/build/native/include/"
          }
          Copy-Item "$Root/LICENSE","$Root/src/distribution/pkgicon.png" $macPkg
@"
          <?xml version="1.0"?>
          <package xmlns="http://schemas.microsoft.com/packaging/2013/05/nuspec.xsd">
            <metadata>
              <id>MsQuicBuilds.Native.macOS</id>
              <version>$Version</version>
              <title>MsQuic (macOS)</title>
              <authors>Microsoft</authors>
              <license type="expression">MIT</license>
              <icon>pkgicon.png</icon>
              <projectUrl>https://github.com/microsoft/msquic</projectUrl>
              <requireLicenseAcceptance>true</requireLicenseAcceptance>
              <copyright>© Microsoft Corporation. All rights reserved.</copyright>
              <description>MsQuic native library for osx-x64 and osx-arm64 using quictls for TLS</description>
              <repository type="git" url="$RepoRemote" commit="$CommitHash" />
              <tags>native quic msquic macos</tags>
            </metadata>
            <files>
              <file src="runtimes/**/*" target="runtimes/" />
              <file src="build/**/*" target="build/" />
              <file src="LICENSE" />
              <file src="pkgicon.png" />
            </files>
          </package>
"@ | Set-Content "$macPkg/MsQuicBuilds.Native.macOS.nuspec" -Encoding UTF8
          nuget pack "$macPkg/MsQuicBuilds.Native.macOS.nuspec" -OutputDirectory $DistDir -BasePath $macPkg -p CommitHash=$CommitHash -p RepoRemote=$RepoRemote -Version $Version

          # ── Meta packages (aggregate all platforms) ─────────────────────
          Write-Host "=== Packaging Meta ==="
          function New-MetaPkg([string]$Id, [string]$WinDep, [string]$Title) {
            $d = "$ArtifactsDir/temp/meta/$Id"
            Remove-Item $d -Recurse -Force -ErrorAction Ignore
            New-Item $d -Type Dir -Force | Out-Null
@"
          <?xml version="1.0"?>
          <package xmlns="http://schemas.microsoft.com/packaging/2013/05/nuspec.xsd">
            <metadata>
              <id>$Id</id>
              <version>$Version</version>
              <title>MsQuic ($Title – all platforms)</title>
              <authors>Microsoft</authors>
              <license type="expression">MIT</license>
              <icon>pkgicon.png</icon>
              <projectUrl>https://github.com/microsoft/msquic</projectUrl>
              <requireLicenseAcceptance>true</requireLicenseAcceptance>
              <copyright>© Microsoft Corporation. All rights reserved.</copyright>
              <description>Aggregate meta-package pulling in native MsQuic binaries for Windows, Linux, and macOS (TLS: $Title)</description>
              <repository type="git" url="$RepoRemote" commit="$CommitHash" />
              <tags>native quic msquic allplatforms</tags>
              <dependencies>
                <group targetFramework="native">
                  <dependency id="$WinDep" version="[$Version]" />
                  <dependency id="MsQuicBuilds.Native.Linux" version="[$Version]" />
                  <dependency id="MsQuicBuilds.Native.macOS" version="[$Version]" />
                </group>
              </dependencies>
            </metadata>
          </package>
"@ | Set-Content "$d/$Id.nuspec" -Encoding UTF8
            nuget pack "$d/$Id.nuspec" -OutputDirectory $DistDir -BasePath $d -Version $Version
          }
          New-MetaPkg "MsQuicBuilds.Native.AllPlatforms.Schannel" "MsQuicBuilds.Native.Schannel" "Schannel"
          New-MetaPkg "MsQuicBuilds.Native.AllPlatforms.QuicTls" "MsQuicBuilds.Native.Quictls" "QuicTls"

          Write-Host "=== All NuGet packages ==="
          Get-ChildItem $DistDir

      - name: Create uncompressed archive for upload
        run: tar -cf nuget-packages.tar -C dist .

      - name: Upload NuGet packages (uncompressed)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          archive: false
          path: nuget-packages.tar

      - name: Push to GitHub NuGet registry
        if: github.event_name != 'pull_request'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $source = "https://nuget.pkg.github.com/$env:GITHUB_REPOSITORY_OWNER/index.json"
          Write-Host "Pushing to $source"
          Get-ChildItem "dist/*.nupkg" | ForEach-Object {
            Write-Host "  pushing $($_.Name)"
            dotnet nuget push $_.FullName --source $source --api-key $env:GITHUB_TOKEN --skip-duplicate
          }

  #############################################################################
  # COMPLETE sentinel – validates every job passed
  #############################################################################
  complete:
    if: always()
    needs: [build, linux-arm64, nuget]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
