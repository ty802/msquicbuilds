name: build msquic

on:
  workflow_dispatch:
    inputs:
      msquic_version:
        description: 'MsQuic base version (e.g. 2.6.0)'
        required: false
        default: '2.6.0'
      msquic_ref:
        description: 'MsQuic git ref (branch/tag/commit)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  #############################################################################
  # NATIVE BUILDS: runs directly on the target OS runner
  #############################################################################
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-amd64
            os: windows-2022
            platform: windows
            arch: x64
            tls: schannel

          - name: windows-arm64
            os: windows-2022
            platform: windows
            arch: arm64
            tls: schannel

          - name: windows-amd64-quictls
            os: windows-2022
            platform: windows
            arch: x64
            tls: quictls

          - name: windows-arm64-quictls
            os: windows-2022
            platform: windows
            arch: arm64
            tls: quictls

          - name: linux-amd64
            os: ubuntu-22.04
            platform: linux
            arch: x64
            tls: quictls

          - name: macos-amd64
            os: macos-15
            platform: macos
            arch: x64
            tls: quictls

          - name: macos-arm64
            os: macos-15
            platform: macos
            arch: arm64
            tls: quictls

          - name: android-arm64
            os: ubuntu-22.04
            platform: android
            arch: arm64
            tls: quictls

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout msquic
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: microsoft/msquic
          submodules: false
          fetch-depth: 0
          path: src

      - name: Init required submodules
        shell: pwsh
        run: |
          $submodules = @()
          if ("${{ matrix.platform }}" -eq "windows") { $submodules += "submodules/xdp-for-windows" }
          if ("${{ matrix.tls }}" -ne "schannel")   { $submodules += "submodules/quictls" }
          if ($submodules.Count -gt 0) {
            git -C src submodule update --init --depth 1 $submodules
          }

      - name: Install deps (Linux native)
        if: runner.os == 'Linux' && matrix.platform == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake build-essential liblttng-ust-dev lttng-tools libssl-dev libnuma-dev

      - name: Setup Android NDK
        if: matrix.platform == 'android'
        run: |
          curl -sSL https://dl.google.com/android/repository/android-ndk-r27c-linux.zip -o /tmp/ndk.zip
          unzip -q /tmp/ndk.zip -d /opt
          echo "ANDROID_NDK_LATEST_HOME=/opt/android-ndk-r27c" >> "$GITHUB_ENV"

      - name: Install deps (Android)
        if: matrix.platform == 'android'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq cmake build-essential

      - name: Install NASM (Windows quictls)
        if: runner.os == 'Windows' && matrix.tls != 'schannel'
        uses: ilammy/setup-nasm@72793074d3c8cdda771dba85f6deafe00623038b # v1.5.2

      - name: Install Perl (Windows quictls — needed by OpenSSL build)
        if: runner.os == 'Windows' && matrix.tls != 'schannel'
        shell: pwsh
        run: choco install strawberryperl -y --no-progress --limit-output

      - name: Build
        shell: pwsh
        working-directory: src
        run: |
          if ($env:RUNNER_OS -eq 'Windows') {
            scripts/build.ps1 -Config Release -Platform ${{ matrix.platform }} -Arch ${{ matrix.arch }} -Tls ${{ matrix.tls }} -DisableTools -DisableTest -DisablePerf -Generator "Visual Studio 17 2022"
          } else {
            scripts/build.ps1 -Config Release -Platform ${{ matrix.platform }} -Arch ${{ matrix.arch }} -Tls ${{ matrix.tls }} -DisableTools -DisableTest -DisablePerf
          }

      - name: Upload raw artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.name }}
          path: src/artifacts/

  #############################################################################
  # LINUX ARM64 CROSS-COMPILE (needs the msquic cross-compile Docker image)
  #############################################################################
  linux-arm64:
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/microsoft/msquic/linux-build-xcomp:ubuntu-22.04-cross
    steps:
      - name: Checkout msquic
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: microsoft/msquic
          submodules: false
          fetch-depth: 0
          path: src

      - name: Init required submodules (quictls)
        shell: bash
        run: git -C src submodule update --init --depth 1 submodules/quictls

      - name: Fix git ownership
        run: chown -R $(id -u):$(id -g) src/
        shell: bash

      - name: Build (cross-compile)
        shell: pwsh
        working-directory: src
        run: scripts/build.ps1 -Config Release -Platform linux -Arch arm64 -Tls quictls -DisableTools -DisableTest -DisablePerf -OneBranch

      - name: Upload raw artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-arm64
          path: src/artifacts/

  #############################################################################
  # NUGET PACKAGING – produce all .nupkg in one job, push once
  #############################################################################
  nuget:
    needs: [build, linux-arm64]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: microsoft/msquic
          path: src

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: src/artifacts
          merge-multiple: true

      - uses: nuget/setup-nuget@fd55a6f3b34392fa83fde1454582407d8c714123 # v4.0
        with:
          nuget-version: latest

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 8.x

      - name: Package all NuGet packages
        shell: pwsh
        working-directory: src
        run: |
          $ErrorActionPreference = 'Stop'
          $Root = Resolve-Path "."
          $ArtifactsDir = "$Root/artifacts"
          $DistDir = "$Root/../dist"
          $CommitHash = & git -C $Root rev-parse HEAD
          $RepoRemote = "https://github.com/microsoft/msquic.git"
          $Version = "${{ github.event.inputs.msquic_version }}-ci.$env:GITHUB_RUN_NUMBER"

          New-Item $DistDir -ItemType Directory -Force | Out-Null

          function New-MsQuicPkg {
            param([string]$Tls, [array]$Platforms)
            $title = $Tls.Substring(0,1).ToUpper() + $Tls.Substring(1)
            $Id = "MsQuicBuilds.Native.$title"
            $p = "$ArtifactsDir/temp/nuget/$Id"
            Remove-Item $p -Recurse -Force -ErrorAction Ignore
            foreach ($plat in $Platforms) {
              New-Item "$p/runtimes/$($plat.rid)/native" -Type Dir -Force | Out-Null
            }
            New-Item "$p/build/native/include" -Type Dir -Force | Out-Null

            foreach ($plat in $Platforms) {
              $srcBin = "$ArtifactsDir/bin/$($plat.os)/$($plat.a)_Release_$($plat.tls)"
              if ($plat.os -eq 'windows') {
                Copy-Item "$srcBin/msquic.dll","$srcBin/msquic.pdb","$srcBin/msquic.lib" "$p/runtimes/$($plat.rid)/native/"
              } elseif ($plat.os -eq 'macos') {
                Copy-Item "$srcBin/libmsquic.dylib" "$p/runtimes/$($plat.rid)/native/"
              } else {
                Copy-Item "$srcBin/libmsquic.so" "$p/runtimes/$($plat.rid)/native/"
              }
            }

            foreach ($h in @("msquic.h","msquicp.h","msquic.hpp","msquic_winuser.h")) {
              $s = "$Root/src/inc/$h"
              if (Test-Path $s) { Copy-Item $s "$p/build/native/include/" }
            }
            Copy-Item "$Root/LICENSE" $p
            $hasIcon = Test-Path "$Root/src/distribution/pkgicon.png"
            if ($hasIcon) { Copy-Item "$Root/src/distribution/pkgicon.png" $p }

            $tl = @(
              '<?xml version="1.0" encoding="utf-8"?>',
              '<Project ToolsVersion="4.0" xmlns="http://schemas.microsoft.com/developer/msbuild/2003">',
              '  <ItemDefinitionGroup>',
              '    <ClCompile>',
              '      <AdditionalIncludeDirectories>`$(MSBuildThisFileDirectory)include/;%(AdditionalIncludeDirectories)</AdditionalIncludeDirectories>',
              '    </ClCompile>'
            )
            foreach ($plat in $Platforms | Where-Object { $_.os -eq 'windows' }) {
              $tl += "    <Link Condition=""'`$(Platform.ToLower())' == '$($plat.a)'"">"
              $tl += "      <AdditionalDependencies>`$(MSBuildThisFileDirectory)../../runtimes/$($plat.rid)/native/msquic.lib;%(AdditionalDependencies)</AdditionalDependencies>"
              $tl += "    </Link>"
            }
            $tl += '  </ItemDefinitionGroup>'
            $tl += '  <Target Name="msquic_AfterBuild" AfterTargets="AfterBuild" />'
            foreach ($plat in $Platforms | Where-Object { $_.os -eq 'windows' }) {
              $tl += "  <Target Name=""msquic_AfterBuild_$($plat.a)"" Label=""$($plat.a)"" Condition=""'`$(RuntimeIdentifier)' == '$($plat.rid)' Or '`$(Platform.ToLower())' == '$($plat.a)'"" AfterTargets=""msquic_AfterBuild"">"
              $tl += "    <Copy SourceFiles=""`$(MSBuildThisFileDirectory)../../runtimes/$($plat.rid)/native/msquic.dll"" DestinationFolder=""`$(TargetDir)"" SkipUnchangedFiles=""true"" />"
              $tl += "  </Target>"
            }
            $tl += '</Project>'
            $tl -join "`n" | Set-Content "$p/build/native/$Id.targets" -Encoding UTF8

            $rids = ($Platforms | ForEach-Object { $_.rid }) -join ', '
            $iconMeta = if ($hasIcon) { "    <icon>pkgicon.png</icon>" } else { "" }
            $iconFile = if ($hasIcon) { "    <file src=`"pkgicon.png`" />" } else { "" }
            @"
          <?xml version="1.0"?>
          <package xmlns="http://schemas.microsoft.com/packaging/2013/05/nuspec.xsd">
            <metadata>
              <id>$Id</id>
              <version>$Version</version>
              <title>MsQuic ($title)</title>
              <authors>Microsoft</authors>
              <license type="expression">MIT</license>
          $iconMeta
              <projectUrl>https://github.com/microsoft/msquic</projectUrl>
              <requireLicenseAcceptance>true</requireLicenseAcceptance>
              <copyright>© Microsoft Corporation. All rights reserved.</copyright>
              <description>MsQuic native library for $rids using $title for TLS</description>
              <repository type="git" url="$RepoRemote" commit="$CommitHash" />
              <tags>native quic msquic $Tls</tags>
            </metadata>
            <files>
              <file src="runtimes/**/*" target="runtimes/" />
              <file src="build/**/*" target="build/" />
              <file src="LICENSE" />
          $iconFile
            </files>
          </package>
          "@ | Set-Content "$p/$Id.nuspec" -Encoding UTF8

            nuget pack "$p/$Id.nuspec" -OutputDirectory $DistDir -BasePath $p -Version $Version
          }

          # Schannel: Windows only (x64 + arm64)
          Write-Host "=== Packaging MsQuicBuilds.Native.Schannel ==="
          New-MsQuicPkg -Tls schannel -Platforms @(
            @{rid="win-x64";   os="windows"; a="x64";   tls="schannel"},
            @{rid="win-arm64"; os="windows"; a="arm64"; tls="schannel"}
          )

          # Quictls: all platforms
          Write-Host "=== Packaging MsQuicBuilds.Native.Quictls ==="
          New-MsQuicPkg -Tls quictls -Platforms @(
            @{rid="win-x64";        os="windows"; a="x64";   tls="quictls"},
            @{rid="win-arm64";      os="windows"; a="arm64"; tls="quictls"},
            @{rid="linux-x64";      os="linux";   a="x64";   tls="quictls"},
            @{rid="linux-arm64";    os="linux";   a="arm64"; tls="quictls"},
            @{rid="osx-x64";        os="macos";   a="x64";   tls="quictls"},
            @{rid="osx-arm64";      os="macos";   a="arm64"; tls="quictls"},
            @{rid="android-arm64";  os="android"; a="arm64"; tls="quictls"}
          )

          Write-Host "=== All NuGet packages ==="
          Get-ChildItem $DistDir

      - name: Upload NuGet packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nuget-packages
          path: dist/

      - name: Push to GitHub NuGet registry
        if: github.event_name != 'pull_request'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $source = "https://nuget.pkg.github.com/$env:GITHUB_REPOSITORY_OWNER/index.json"
          Write-Host "Pushing to $source"
          Get-ChildItem "dist/*.nupkg" | ForEach-Object {
            Write-Host "  pushing $($_.Name)"
            dotnet nuget push $_.FullName --source $source --api-key $env:GITHUB_TOKEN --skip-duplicate
          }

  #############################################################################
  # COMPLETE sentinel – validates every job passed
  #############################################################################
  complete:
    if: always()
    needs: [build, linux-arm64, nuget]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
