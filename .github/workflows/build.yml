name: build msquic

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  #############################################################################
  # NATIVE BUILDS: runs directly on the target OS runner
  #############################################################################
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-amd64
            os: windows-2022
            platform: windows
            arch: x64
            tls: schannel

          - name: windows-arm64
            os: windows-2022
            platform: windows
            arch: arm64
            tls: schannel

          - name: windows-amd64-quictls
            os: windows-2022
            platform: windows
            arch: x64
            tls: quictls

          - name: linux-amd64
            os: ubuntu-22.04
            platform: linux
            arch: x64
            tls: quictls

          - name: macos-amd64
            os: macos-15
            platform: macos
            arch: x64
            tls: quictls

          - name: macos-arm64
            os: macos-15
            platform: macos
            arch: arm64
            tls: quictls

          - name: android-arm64
            os: ubuntu-22.04
            platform: android
            arch: arm64
            tls: quictls

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout msquic
        uses: actions/checkout@v4
        with:
          repository: microsoft/msquic
          submodules: false
          fetch-depth: 0
          path: src

      - name: Init required submodules
        shell: pwsh
        run: |
          $submodules = @()
          if ("${{ matrix.platform }}" -eq "windows") { $submodules += "submodules/xdp-for-windows" }
          if ("${{ matrix.tls }}" -ne "schannel")   { $submodules += "submodules/quictls" }
          if ($submodules.Count -gt 0) {
            git -C src submodule update --init --depth 1 $submodules
          }

      - name: Install deps (Linux native)
        if: runner.os == 'Linux' && matrix.platform == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake build-essential liblttng-ust-dev lttng-tools libssl-dev libnuma-dev

      - name: Setup Android NDK
        if: matrix.platform == 'android'
        run: |
          curl -sSL https://dl.google.com/android/repository/android-ndk-r27c-linux.zip -o /tmp/ndk.zip
          unzip -q /tmp/ndk.zip -d /opt
          echo "ANDROID_NDK_LATEST_HOME=/opt/android-ndk-r27c" >> "$GITHUB_ENV"

      - name: Install deps (Android)
        if: matrix.platform == 'android'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq cmake build-essential

      - name: Install NASM (Windows quictls)
        if: runner.os == 'Windows' && matrix.tls != 'schannel'
        uses: ilammy/setup-nasm@v1

      - name: Install Perl (Windows quictls — needed by OpenSSL build)
        if: runner.os == 'Windows' && matrix.tls != 'schannel'
        shell: pwsh
        run: choco install strawberryperl -y --no-progress --limit-output

      - name: Build
        shell: pwsh
        working-directory: src
        run: |
          if ($env:RUNNER_OS -eq 'Windows') {
            scripts/build.ps1 -Config Release -Platform ${{ matrix.platform }} -Arch ${{ matrix.arch }} -Tls ${{ matrix.tls }} -DisableTools -DisableTest -DisablePerf -Generator "Visual Studio 17 2022"
          } else {
            scripts/build.ps1 -Config Release -Platform ${{ matrix.platform }} -Arch ${{ matrix.arch }} -Tls ${{ matrix.tls }} -DisableTools -DisableTest -DisablePerf
          }

      - name: Upload raw artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: src/artifacts/

  #############################################################################
  # LINUX ARM64 CROSS-COMPILE (needs the msquic cross-compile Docker image)
  #############################################################################
  linux-arm64:
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/microsoft/msquic/linux-build-xcomp:ubuntu-22.04-cross
    steps:
      - name: Checkout msquic
        uses: actions/checkout@v4
        with:
          repository: microsoft/msquic
          submodules: false
          fetch-depth: 0
          path: src

      - name: Init required submodules (quictls)
        shell: bash
        run: git -C src submodule update --init --depth 1 submodules/quictls

      - name: Fix git ownership
        run: chown -R $(id -u):$(id -g) src/
        shell: bash

      - name: Build (cross-compile)
        shell: pwsh
        working-directory: src
        run: scripts/build.ps1 -Config Release -Platform linux -Arch arm64 -Tls quictls -DisableTools -DisableTest -DisablePerf -OneBranch

      - name: Upload raw artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: src/artifacts/

  #############################################################################
  # NUGET PACKAGING (Windows – produces .nupkg per TLS provider)
  #############################################################################
  nuget-windows:
    needs: [build]
    runs-on: windows-2022
    steps:
      - name: Checkout msquic (headers + distribution metadata)
        uses: actions/checkout@v4
        with:
          repository: microsoft/msquic
          path: src

      - name: Download Windows amd64 (schannel) artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-amd64
          path: src/artifacts

      - name: Download Windows arm64 (schannel) artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-arm64
          path: src/artifacts

      - name: Download Windows amd64 (quictls) artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-amd64-quictls
          path: src/artifacts

      - name: Install NuGet CLI
        uses: nuget/setup-nuget@v4
        with:
          nuget-version: latest

      - name: Package NuGet
        shell: pwsh
        working-directory: src
        run: |
          $ErrorActionPreference = 'Stop'
          $Config = "Release"
          $Root = Resolve-Path "."
          $ArtifactsDir = "$Root/artifacts"
          $PlatformDir = "$ArtifactsDir/bin/windows"
          $DistDir = "$ArtifactsDir/dist"
          $CommitHash = & git -C $Root rev-parse HEAD
          $RepoRemote = "https://github.com/microsoft/msquic.git"
          $Version = "2.6.0-ci.$env:GITHUB_RUN_NUMBER"

          $CommonHeaders = @("msquic.h", "msquicp.h", "msquic.hpp", "msquic_winuser.h")

          function New-NuGetPackage {
            param($Tls, $Archs)

            $PackagingDir = "$ArtifactsDir/temp/nuget/$Tls"
            Remove-Item $PackagingDir -Recurse -Force -ErrorAction Ignore

            foreach ($Arch in $Archs) {
              New-Item -Path "$PackagingDir/build/native/lib/$Arch" -ItemType Directory -Force | Out-Null
              New-Item -Path "$PackagingDir/build/native/bin/$Arch" -ItemType Directory -Force | Out-Null
            }
            New-Item -Path "$PackagingDir/build/native/include" -ItemType Directory -Force | Out-Null
            New-Item -Path $DistDir -ItemType Directory -Force | Out-Null

            # Binaries per arch
            foreach ($Arch in $Archs) {
              $BuildPath = "$PlatformDir/${Arch}_${Config}_${Tls}"
              Write-Host "[$Tls] Copying from $BuildPath"
              Copy-Item "$BuildPath/msquic.dll" "$PackagingDir/build/native/bin/$Arch/"
              Copy-Item "$BuildPath/msquic.pdb" "$PackagingDir/build/native/bin/$Arch/"
              Copy-Item "$BuildPath/msquic.lib" "$PackagingDir/build/native/lib/$Arch/"
            }

            # Headers
            foreach ($h in $CommonHeaders) {
              Copy-Item "$Root/src/inc/$h" "$PackagingDir/build/native/include/"
            }

            # Metadata
            Copy-Item "$Root/LICENSE" $PackagingDir
            Copy-Item "$Root/src/distribution/pkgicon.png" $PackagingDir

            # Caps-normalize for file names (schannel → Schannel)
            $TlsLabel = "$($Tls.Substring(0,1).ToUpper())$($Tls.Substring(1))"
            $ArchDesc = ($Archs -join ', ')

            @"
          <?xml version="1.0"?>
          <package xmlns="http://schemas.microsoft.com/packaging/2011/08/nuspec.xsd">
            <metadata>
              <id>Microsoft.Native.Quic.MsQuic.$TlsLabel</id>
              <version>$Version</version>
              <title>MsQuic ($TlsLabel)</title>
              <authors>Microsoft</authors>
              <license type="expression">MIT</license>
              <icon>pkgicon.png</icon>
              <projectUrl>https://github.com/microsoft/msquic</projectUrl>
              <requireLicenseAcceptance>true</requireLicenseAcceptance>
              <copyright>© Microsoft Corporation. All rights reserved.</copyright>
              <description>MsQuic native library for $ArchDesc using $Tls for TLS</description>
              <repository type="git" url="$RepoRemote" commit="$CommitHash" />
              <tags>native quic msquic $Tls</tags>
            </metadata>
          </package>
          "@ | Set-Content "$PackagingDir/Microsoft.Native.Quic.MsQuic.$TlsLabel.nuspec" -Encoding UTF8

            # Build .targets
            $targetLines = @(
              '<?xml version="1.0" encoding="utf-8"?>',
              '<Project ToolsVersion="4.0" xmlns="http://schemas.microsoft.com/developer/msbuild/2003">',
              '  <ItemDefinitionGroup>',
              '    <ClCompile>',
              '      <AdditionalIncludeDirectories>`$(MSBuildThisFileDirectory)include/;%(AdditionalIncludeDirectories)</AdditionalIncludeDirectories>',
              '    </ClCompile>'
            )
            foreach ($Arch in $Archs) {
              $targetLines += "    <Link Condition=""'`$(Platform.ToLower())' == '$Arch'"">"
              $targetLines += "      <AdditionalDependencies>`$(MSBuildThisFileDirectory)lib/$Arch/msquic.lib;%(AdditionalDependencies)</AdditionalDependencies>"
              $targetLines += "    </Link>"
            }
            $targetLines += '  </ItemDefinitionGroup>'
            $targetLines += '  <Target Name="msquic_AfterBuild" AfterTargets="AfterBuild" />'
            foreach ($Arch in $Archs) {
              $targetLines += "  <Target Name=""msquic_AfterBuild_$Arch"" Label=""$Arch"" Condition=""'`$(Platform.ToLower())' == '$Arch'"" AfterTargets=""msquic_AfterBuild"">"
              $targetLines += "    <Copy SourceFiles=""`$(MSBuildThisFileDirectory)bin/$Arch/msquic.dll"" DestinationFolder=""`$(TargetDir)"" SkipUnchangedFiles=""true"" />"
              $targetLines += "  </Target>"
            }
            $targetLines += '</Project>'

            $targetLines -join "`n" | Set-Content "$PackagingDir/build/native/Microsoft.Native.Quic.MsQuic.$TlsLabel.targets" -Encoding UTF8

            # Pack
            nuget pack "$PackagingDir/Microsoft.Native.Quic.MsQuic.$TlsLabel.nuspec" `
              -OutputDirectory $DistDir `
              -p CommitHash=$CommitHash `
              -p RepoRemote=$RepoRemote `
              -Version $Version
          }

          # Schannel: x64 + arm64
          New-NuGetPackage -Tls schannel -Archs @("x64", "arm64")

          # QuicTLS: x64 only (quictls/openssl don't support Windows arm64)
          New-NuGetPackage -Tls quictls -Archs @("x64")

          Write-Host "=== NuGet packages ==="
          Get-ChildItem $DistDir

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-windows
          path: src/artifacts/dist/*.nupkg

      - name: Push to GitHub NuGet registry
        if: github.event_name != 'pull_request'
        shell: pwsh
        working-directory: src
        run: |
          $source = "https://nuget.pkg.github.com/$env:GITHUB_REPOSITORY_OWNER/index.json"
          $dist = "artifacts/dist"
          Write-Host "Pushing packages to $source"
          Get-ChildItem "$dist/*.nupkg" | ForEach-Object {
            Write-Host "  pushing $($_.Name)"
            nuget sources add -name "GitHub" -Source $source -Username oauth2 -Password $env:GITHUB_TOKEN -StorePasswordInClearText 2>$null | Out-Null
            nuget push $_.FullName -Source "GitHub" -ApiKey $env:GITHUB_TOKEN -SkipDuplicate
          }

  #############################################################################
  # NUGET PACKAGING (Linux – runtimes/ layout for x64 + arm64)
  #############################################################################
  nuget-linux:
    needs: [build, linux-arm64]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout msquic (headers + distribution metadata)
        uses: actions/checkout@v4
        with:
          repository: microsoft/msquic
          path: src

      - name: Download linux-amd64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-amd64
          path: src/artifacts

      - name: Download linux-arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-arm64
          path: src/artifacts

      - name: Install NuGet CLI
        uses: nuget/setup-nuget@v4
        with:
          nuget-version: latest

      - name: Create & publish Linux NuGet packages
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $Root = "src"
          $ArtifactsDir = "$Root/artifacts"
          $PlatformDir = "$ArtifactsDir/bin/linux"
          $DistDir = "dist"
          $CommitHash = & git -C $Root rev-parse HEAD
          $RepoRemote = "https://github.com/microsoft/msquic.git"
          $Version = "2.6.0-ci.$env:GITHUB_RUN_NUMBER"

          New-Item -Path $DistDir -ItemType Directory -Force | Out-Null

          # ── combined package with runtimes/ layout ──────────────────────
          $PkgDir = "tmp/linux"
          Remove-Item $PkgDir -Recurse -Force -ErrorAction Ignore

          foreach ($arch in @("x64", "arm64")) {
            $rid = "linux-$arch"
            $soDir = "$PkgDir/runtimes/$rid/native"
            New-Item -Path $soDir -ItemType Directory -Force | Out-Null
            Copy-Item "$PlatformDir/${arch}_Release_quictls/libmsquic.so" "$soDir/"
          }

          # Headers (platform neutral – include once)
          New-Item -Path "$PkgDir/build/native/include" -ItemType Directory -Force | Out-Null
          foreach ($h in @("msquic.h", "msquicp.h", "msquic.hpp")) {
            Copy-Item "$Root/src/inc/$h" "$PkgDir/build/native/include/"
          }

          Copy-Item "$Root/LICENSE" $PkgDir/
          Copy-Item "$Root/src/distribution/pkgicon.png" $PkgDir

          @"
          <?xml version="1.0"?>
          <package xmlns="http://schemas.microsoft.com/packaging/2013/05/nuspec.xsd">
            <metadata>
              <id>Microsoft.Native.Quic.MsQuic.Linux</id>
              <version>$Version</version>
              <title>MsQuic (Linux)</title>
              <authors>Microsoft</authors>
              <license type="expression">MIT</license>
              <icon>pkgicon.png</icon>
              <projectUrl>https://github.com/microsoft/msquic</projectUrl>
              <requireLicenseAcceptance>true</requireLicenseAcceptance>
              <copyright>© Microsoft Corporation. All rights reserved.</copyright>
              <description>MsQuic native library for linux-x64 and linux-arm64 using quictls for TLS</description>
              <repository type="git" url="$RepoRemote" commit="$CommitHash" />
              <tags>native quic msquic linux</tags>
            </metadata>
            <files>
              <file src="runtimes/**/*" target="runtimes/" />
              <file src="build/**/*" target="build/" />
              <file src="LICENSE" target="" />
              <file src="pkgicon.png" target="" />
            </files>
          </package>
          "@ | Set-Content "$PkgDir/Microsoft.Native.Quic.MsQuic.Linux.nuspec" -Encoding UTF8

          # Pack
          nuget pack "$PkgDir/Microsoft.Native.Quic.MsQuic.Linux.nuspec" `
            -OutputDirectory $DistDir `
            -BasePath $PkgDir `
            -p CommitHash=$CommitHash `
            -p RepoRemote=$RepoRemote `
            -Version $Version

          Write-Host "=== Linux NuGet packages ==="
          Get-ChildItem $DistDir

      - name: Push to GitHub NuGet registry
        if: github.event_name != 'pull_request'
        shell: pwsh
        run: |
          $source = "https://nuget.pkg.github.com/$env:GITHUB_REPOSITORY_OWNER/index.json"
          Write-Host "Pushing to $source"
          Get-ChildItem "dist/*.nupkg" | ForEach-Object {
            Write-Host "  pushing $($_.Name)"
            nuget sources add -name "GitHub" -Source $source -Username oauth2 -Password $env:GITHUB_TOKEN -StorePasswordInClearText 2>$null | Out-Null
            nuget push $_.FullName -Source "GitHub" -ApiKey $env:GITHUB_TOKEN -SkipDuplicate
          }

  #############################################################################
  # NUGET PACKAGING (macOS – runtimes/ layout for x64 + arm64)
  #############################################################################
  nuget-macos:
    needs: [build]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout msquic (headers + distribution metadata)
        uses: actions/checkout@v4
        with:
          repository: microsoft/msquic
          path: src

      - name: Download macOS amd64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-amd64
          path: src/artifacts

      - name: Download macOS arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64
          path: src/artifacts

      - name: Install NuGet CLI
        uses: nuget/setup-nuget@v4
        with:
          nuget-version: latest

      - name: Create & publish macOS NuGet packages
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $Root = "src"
          $ArtifactsDir = "$Root/artifacts"
          $PlatformDir = "$ArtifactsDir/bin/macos"
          $DistDir = "dist"
          $CommitHash = & git -C $Root rev-parse HEAD
          $RepoRemote = "https://github.com/microsoft/msquic.git"
          $Version = "2.6.0-ci.$env:GITHUB_RUN_NUMBER"

          New-Item -Path $DistDir -ItemType Directory -Force | Out-Null

          # ── combined package with runtimes/ layout ──────────────────────
          $PkgDir = "tmp/macos"
          Remove-Item $PkgDir -Recurse -Force -ErrorAction Ignore

          foreach ($entry in @(@{arch="x64";rid="osx-x64"}, @{arch="arm64";rid="osx-arm64"})) {
            $soDir = "$PkgDir/runtimes/$($entry.rid)/native"
            New-Item -Path $soDir -ItemType Directory -Force | Out-Null
            Copy-Item "$PlatformDir/$($entry.arch)_Release_quictls/libmsquic.dylib" "$soDir/"
          }

          # Headers
          New-Item -Path "$PkgDir/build/native/include" -ItemType Directory -Force | Out-Null
          foreach ($h in @("msquic.h", "msquicp.h", "msquic.hpp")) {
            Copy-Item "$Root/src/inc/$h" "$PkgDir/build/native/include/"
          }

          Copy-Item "$Root/LICENSE" $PkgDir/
          Copy-Item "$Root/src/distribution/pkgicon.png" $PkgDir

          @"
          <?xml version="1.0"?>
          <package xmlns="http://schemas.microsoft.com/packaging/2013/05/nuspec.xsd">
            <metadata>
              <id>Microsoft.Native.Quic.MsQuic.macOS</id>
              <version>$Version</version>
              <title>MsQuic (macOS)</title>
              <authors>Microsoft</authors>
              <license type="expression">MIT</license>
              <icon>pkgicon.png</icon>
              <projectUrl>https://github.com/microsoft/msquic</projectUrl>
              <requireLicenseAcceptance>true</requireLicenseAcceptance>
              <copyright>© Microsoft Corporation. All rights reserved.</copyright>
              <description>MsQuic native library for osx-x64 and osx-arm64 using quictls for TLS</description>
              <repository type="git" url="$RepoRemote" commit="$CommitHash" />
              <tags>native quic msquic macos</tags>
            </metadata>
            <files>
              <file src="runtimes/**/*" target="runtimes/" />
              <file src="build/**/*" target="build/" />
              <file src="LICENSE" target="" />
              <file src="pkgicon.png" target="" />
            </files>
          </package>
          "@ | Set-Content "$PkgDir/Microsoft.Native.Quic.MsQuic.macOS.nuspec" -Encoding UTF8

          nuget pack "$PkgDir/Microsoft.Native.Quic.MsQuic.macOS.nuspec" `
            -OutputDirectory $DistDir `
            -BasePath $PkgDir `
            -p CommitHash=$CommitHash `
            -p RepoRemote=$RepoRemote `
            -Version $Version

          Write-Host "=== macOS NuGet packages ==="
          Get-ChildItem $DistDir

      - name: Push to GitHub NuGet registry
        if: github.event_name != 'pull_request'
        shell: pwsh
        run: |
          $source = "https://nuget.pkg.github.com/$env:GITHUB_REPOSITORY_OWNER/index.json"
          Write-Host "Pushing to $source"
          Get-ChildItem "dist/*.nupkg" | ForEach-Object {
            Write-Host "  pushing $($_.Name)"
            nuget sources add -name "GitHub" -Source $source -Username oauth2 -Password $env:GITHUB_TOKEN -StorePasswordInClearText 2>$null | Out-Null
            nuget push $_.FullName -Source "GitHub" -ApiKey $env:GITHUB_TOKEN -SkipDuplicate
          }

  #############################################################################
  # META PACKAGES – aggregate all OS platform packages into one ref
  #  - Schannel flavor (Windows Schannel + Linux + macOS)
  #  - QuicTls flavor   (Windows QuicTls + Linux + macOS)
  #############################################################################
  nuget-meta:
    needs: [nuget-windows, nuget-linux, nuget-macos]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout msquic (to grab version metadata)
        uses: actions/checkout@v4
        with:
          repository: microsoft/msquic
          path: src

      - name: Install NuGet CLI
        uses: nuget/setup-nuget@v4
        with:
          nuget-version: latest

      - name: Create & publish meta NuGet packages
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $CommitHash = & git -C src rev-parse HEAD
          $RepoRemote = "https://github.com/microsoft/msquic.git"
          $Version = "2.6.0-ci.$env:GITHUB_RUN_NUMBER"
          $DistDir = "dist"
          New-Item $DistDir -ItemType Directory -Force | Out-Null

          function New-MetaPackage([string]$Id, [string]$WinDep, [string]$TitleSuffix) {
            $pkgDir = "tmp/meta/$Id"
            Remove-Item $pkgDir -Recurse -Force -ErrorAction Ignore
            New-Item $pkgDir -ItemType Directory -Force | Out-Null

            @"
          <?xml version="1.0"?>
          <package xmlns="http://schemas.microsoft.com/packaging/2013/05/nuspec.xsd">
            <metadata>
              <id>$Id</id>
              <version>$Version</version>
              <title>MsQuic ($TitleSuffix – all platforms)</title>
              <authors>Microsoft</authors>
              <license type="expression">MIT</license>
              <projectUrl>https://github.com/microsoft/msquic</projectUrl>
              <requireLicenseAcceptance>true</requireLicenseAcceptance>
              <copyright>© Microsoft Corporation. All rights reserved.</copyright>
              <description>Aggregate meta-package pulling in native MsQuic binaries for Windows, Linux, and macOS (TLS: $TitleSuffix)</description>
              <repository type="git" url="$RepoRemote" commit="$CommitHash" />
              <tags>native quic msquic allplatforms</tags>
              <dependencies>
                <group targetFramework="native">
                  <dependency id="$WinDep" version="[$Version]" />
                  <dependency id="Microsoft.Native.Quic.MsQuic.Linux" version="[$Version]" />
                  <dependency id="Microsoft.Native.Quic.MsQuic.macOS" version="[$Version]" />
                </group>
              </dependencies>
            </metadata>
          </package>
            "@ | Out-File "$pkgDir/$Id.nuspec" -Encoding UTF8

            nuget pack "$pkgDir/$Id.nuspec" `
              -OutputDirectory $DistDir `
              -BasePath $pkgDir `
              -Version $Version
          }

          New-MetaPackage "Microsoft.Native.Quic.MsQuic.AllPlatforms.Schannel" `
            "Microsoft.Native.Quic.MsQuic.Schannel" "Schannel"

          New-MetaPackage "Microsoft.Native.Quic.MsQuic.AllPlatforms.QuicTls" `
            "Microsoft.Native.Quic.MsQuic.QuicTls" "QuicTls"

          Write-Host "=== Meta NuGet packages ==="
          Get-ChildItem $DistDir

      - name: Push to GitHub NuGet registry
        if: github.event_name != 'pull_request'
        shell: pwsh
        run: |
          $source = "https://nuget.pkg.github.com/$env:GITHUB_REPOSITORY_OWNER/index.json"
          Get-ChildItem "dist/*.nupkg" | ForEach-Object {
            nuget sources add -name "GitHub" -Source $source -Username oauth2 -Password $env:GITHUB_TOKEN -StorePasswordInClearText 2>$null | Out-Null
            nuget push $_.FullName -Source "GitHub" -ApiKey $env:GITHUB_TOKEN -SkipDuplicate
          }

  #############################################################################
  # COMPLETE sentinel – validates every job passed
  #############################################################################
  complete:
    if: always()
    needs: [build, linux-arm64, nuget-windows, nuget-linux, nuget-macos, nuget-meta]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
