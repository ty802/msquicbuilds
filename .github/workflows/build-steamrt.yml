name: build steamrt4

on:
  workflow_dispatch:

jobs:
  steamrt4:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            container: registry.gitlab.steamos.cloud/steamrt/steamrt4/sdk:latest
            msquic_arch: x64
          - arch: aarch64
            container: registry.gitlab.steamos.cloud/steamrt/steamrt4/sdk/arm64-on-amd64:latest
            msquic_arch: arm64

    runs-on: ubuntu-22.04
    container:
      image: ${{ matrix.container }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: microsoft/msquic
          submodules: false
          fetch-depth: 0
          path: src

      - name: Init required submodules
        run: git -C src submodule update --init --depth 1 submodules/openssl

      - name: Install deps
        run: |
          set -e
          apt-get update -qq
          apt-get install -y -qq curl cmake build-essential
          curl -fsSL https://github.com/PowerShell/PowerShell/releases/download/v7.4.7/powershell-7.4.7-linux-x64.tar.gz -o /tmp/pwsh.tar.gz
          mkdir -p /opt/microsoft/powershell/7
          tar -xzf /tmp/pwsh.tar.gz -C /opt/microsoft/powershell/7
          chmod +x /opt/microsoft/powershell/7/pwsh
          ln -sf /opt/microsoft/powershell/7/pwsh /usr/local/bin/pwsh
          /usr/local/bin/pwsh --version

      - name: Build
        shell: pwsh
        working-directory: src
        run: scripts/build.ps1 -Config Release -Platform linux -Arch ${{ matrix.msquic_arch }} -Tls openssl -DisableTools -DisableTest -DisablePerf ${{ matrix.msquic_arch == 'arm64' && '-OneBranch' || '' }}

      - name: Package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $root = Resolve-Path "."
          $staging = "$root/staging"
          $libdir = "$staging/lib"
          $incdir = "$staging/include"
          $pkgdir = "$root/pkg"
          New-Item $libdir,$incdir,$pkgdir -ItemType Directory -Force | Out-Null
          Copy-Item "$root/src/artifacts/bin/linux/${{ matrix.msquic_arch }}_Release_openssl/libmsquic.so*" $libdir/
          Copy-Item "$root/src/src/inc/msquic.h","$root/src/src/inc/msquicp.h","$root/src/src/inc/msquic.hpp" $incdir/
          Copy-Item "$root/src/LICENSE" $staging/
          tar -czf "$pkgdir/msquic-steamrt4-${{ matrix.arch }}.tar.gz" -C $staging .
          echo "Packaged msquic-steamrt4-${{ matrix.arch }}.tar.gz"

      - name: Upload packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: steamrt4-${{ matrix.arch }}
          path: pkg/
